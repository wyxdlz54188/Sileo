name: Build SileoLegacy iOS 6

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build SileoLegacy (iOS 6.0)
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install Theos dependencies
      run: |
        brew install make dpkg libffi ldid
    
    - name: Setup Theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
    
    - name: Download iOS 6.0 SDK
      run: |
        mkdir -p $THEOS/sdks
        cd /tmp
        curl -L -o iPhoneOS6.0.sdk.zip "https://github.com/GrowtopiaJaw/iPhoneOS-SDK/releases/download/v1.0/iPhoneOS6.0.sdk.zip"
        unzip -q iPhoneOS6.0.sdk.zip
        mv 6.0 $THEOS/sdks/iPhoneOS6.0.sdk
        rm -f iPhoneOS6.0.sdk.zip
        echo "SDK installed at $THEOS/sdks/iPhoneOS6.0.sdk"
        ls -la $THEOS/sdks/iPhoneOS6.0.sdk/
        echo "=== Framework dylibs ==="
        ls "$THEOS/sdks/iPhoneOS6.0.sdk/System/Library/Frameworks/" 2>/dev/null || echo "No System/Library/Frameworks"
    
    - name: Generate TBD stubs from SDK dylibs (v4 JSON)
      run: |
        SDK=$THEOS/sdks/iPhoneOS6.0.sdk
        python3 << 'PYEOF'
        import struct, os, json

        SDK = os.environ['THEOS'] + '/sdks/iPhoneOS6.0.sdk'
        SYSTEM_LIB = SDK + '/usr/lib/system'
        USR_LIB = SDK + '/usr/lib'
        FW_DIR = SDK + '/System/Library/Frameworks'

        def parse_fat_first_slice(data):
            magic = struct.unpack('>I', data[:4])[0]
            if magic == 0xcafebabe:
                narchs = struct.unpack('>I', data[4:8])[0]
                ao, az = 0, len(data)
                for i in range(narchs):
                    off = 8 + i * 20
                    ct = struct.unpack('>I', data[off:off+4])[0]
                    if ct == 12:
                        ao = struct.unpack('>I', data[off+8:off+12])[0]
                        az = struct.unpack('>I', data[off+12:off+16])[0]
                        break
                return ao, ao + az
            return 0, len(data)

        def extract_exported_symbols(path):
            with open(path, 'rb') as f:
                data = f.read()
            start, end = parse_fat_first_slice(data)
            magic = struct.unpack_from('<I', data, start)[0]
            is64 = (magic == 0xfeedfacf)
            ncmds = struct.unpack_from('<I', data, start+16)[0]
            hsize = 32 if is64 else 28
            pos = start + hsize
            symoff = nsyms = stroff = strsize = 0
            for _ in range(ncmds):
                if pos + 8 > len(data): break
                cmd = struct.unpack_from('<I', data, pos)[0]
                csz = struct.unpack_from('<I', data, pos+4)[0]
                if cmd == 0x02:
                    symoff = struct.unpack_from('<I', data, pos+8)[0]
                    nsyms = struct.unpack_from('<I', data, pos+12)[0]
                    stroff = struct.unpack_from('<I', data, pos+16)[0]
                    strsize = struct.unpack_from('<I', data, pos+20)[0]
                    break
                pos += csz
            if nsyms == 0:
                return set()
            entry_size = 16 if is64 else 12
            nlist_off = start + symoff
            strtab_off = start + stroff
            symbols = set()
            for i in range(nsyms):
                eoff = nlist_off + i * entry_size
                n_strx = struct.unpack_from('<I', data, eoff)[0]
                n_type = struct.unpack_from('<B', data, eoff+4)[0]
                if n_type & 0x01 and 0 < n_strx < strsize:
                    end2 = data.find(b'\x00', strtab_off + n_strx, strtab_off + n_strx + 256)
                    if end2 == -1: end2 = strtab_off + n_strx + 256
                    name = data[strtab_off + n_strx:end2].decode('ascii', errors='replace')
                    if not name.startswith('_OBJC_') and not name.startswith('.objc_'):
                        symbols.add(name)
            return symbols

        def write_json_tbd(path, install_name, symbols, current_ver="1.0.0", compat_ver="1.0.0"):
            """Write a TBD v4 JSON file compatible with Xcode 16 linker."""
            targets = ["armv7-apple-ios", "armv7s-apple-ios"]
            tbd = {
                "tapi_tbd_version": 4,
                "main_library": {
                    "target_info": [
                        {"target": "armv7-apple-ios", "minimum_deployment": "6.0"},
                        {"target": "armv7s-apple-ios", "minimum_deployment": "6.0"}
                    ],
                    "flags": [
                        {"targets": targets,
                         "attributes": ["not_app_extension_safe"]}
                    ],
                    "install_names": [{"name": install_name}],
                    "current_version": current_ver,
                    "compatibility_version": compat_ver,
                    "swift_abi": 0,
                    "exported_symbols": [
                        {"targets": targets,
                         "data": {"global": sorted(list(symbols))}}
                    ]
                }
            }
            with open(path, 'w') as f:
                json.dump(tbd, f)
            print(f"  Written: {path} ({len(symbols)} symbols)")

        # Collect symbols from system dylibs
        all_system_syms = set()
        if os.path.isdir(SYSTEM_LIB):
            for fname in sorted(os.listdir(SYSTEM_LIB)):
                if not fname.endswith('.dylib'): continue
                syms = extract_exported_symbols(SYSTEM_LIB + '/' + fname)
                all_system_syms.update(syms)
                print(f"  {fname}: {len(syms)} symbols")

        # Also extract from usr/lib dylibs
        if os.path.isdir(USR_LIB):
            for fname in sorted(os.listdir(USR_LIB)):
                if not fname.endswith('.dylib'): continue
                path = USR_LIB + '/' + fname
                try:
                    syms = extract_exported_symbols(path)
                    all_system_syms.update(syms)
                    print(f"  usr/lib/{fname}: {len(syms)} symbols")
                except Exception as e:
                    print(f"  usr/lib/{fname}: skipped ({e})")

        print(f"Total system symbols: {len(all_system_syms)}")

        # Write libSystem.B.tbd in JSON v4 format
        write_json_tbd(
            SDK + '/usr/lib/libSystem.B.tbd',
            '/usr/lib/libSystem.B.dylib',
            all_system_syms,
            "1.0.0", "1.0.0"
        )

        # Also generate framework TBDs from SDK framework dylibs
        if os.path.isdir(FW_DIR):
            print("\n=== Framework TBDs ===")
            for fwname in sorted(os.listdir(FW_DIR)):
                fwpath = FW_DIR + '/' + fwname
                if not fwname.endswith('.framework'): continue
                # The actual dylib inside .framework
                libname = fwname.replace('.framework', '')
                dylib_path = fwpath + '/' + libname
                if os.path.isfile(dylib_path):
                    syms = extract_exported_symbols(dylib_path)
                    if syms:
                        tbd_out = fwpath + '/' + libname + '.tbd'
                        write_json_tbd(
                            tbd_out,
                            '/System/Library/Frameworks/' + fwname + '/' + libname,
                            syms,
                            "6.0.0", "6.0.0"
                        )
        else:
            print("No framework directory found")
        PYEOF
    
    - name: Build SileoLegacy
      working-directory: SileoLegacy
      run: |
        export PATH="$HOME/theos/bin:$PATH"
        gmake package
        ls -la packages/
    
    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: sileo-legacy-ios6
        path: SileoLegacy/packages/*.deb
